# Next.js App Router on Netlify (@netlify/plugin-nextjs / OpenNext).
#
# CRITICAL — Netlify UI Build settings must be:
#   Base directory:     (blank)
#   Publish directory:  (blank)  ← NOT "/", NOT ".", NOT ".next"
#   Build command:      npm run build
# Do NOT add a [build].publish key here; the Next plugin owns the publish dir.
# A UI Publish of ".next" or site root causes /_next/static 404s and a stuck
# "Finding the path…" screen (SSR HTML without client JS).

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
