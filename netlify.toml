# Next.js App Router on Netlify (@netlify/plugin-nextjs v5 / OpenNext).
#
# Netlify UI Build settings must be:
#   Base directory:     (blank)
#   Publish directory:  .next   ← required by plugin v5 (NOT blank, NOT "/", NOT ".")
#   Build command:      npm run build
# Blank publish defaults to site root and the plugin fails with
# "publish directory cannot be the same as the base directory".
# The plugin then stages CDN assets under .netlify/static/_next/...

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
